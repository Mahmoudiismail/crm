name: Build Cognito CLI (Windows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pycognito pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --name cognito-cli `
            --console `
            cognito_login.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: cognito-cli-windows
          path: dist/cognito-cli.exe
          retention-days: 1
