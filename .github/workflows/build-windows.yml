name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build Windows Binary
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: shared-cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            shared-cargo-${{ runner.os }}-

      - name: Build
        run: cargo build --release

      - name: Prepare artifact zip
        shell: pwsh
        run: Compress-Archive -Path target/release/runner.exe,target/release/crm.exe -DestinationPath crm_windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crm_windows_binaries
          path: crm_windows.zip
