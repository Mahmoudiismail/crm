name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-xwin
        run: cargo binstall cargo-xwin -y

      - name: Get Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n 1 | awk -F '"' '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Build Windows Binary
        run: cargo xwin build --release --target x86_64-pc-windows-msvc

      - name: Prepare Artifact
        shell: bash
        run: |
          # The binary will be in target/x86_64-pc-windows-msvc/release/
          zip -j crm_tool.zip target/x86_64-pc-windows-msvc/release/crm_tool.exe

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          draft: false
          prerelease: false
          files: crm_tool.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
