name: Release Binaries

on:
  workflow_dispatch:
    inputs:
      binary:
        description: Binary to release (comma separated, or "all")
        required: true
        default: all
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Build Info
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.vars.outputs.version }}
      build_date: ${{ steps.vars.outputs.build_date }}

    steps:
      - uses: actions/checkout@v4

      - id: vars
        shell: bash
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n1 | awk -F '"' '{print $2}')
          BUILD_DATE=$(date -u +'%Y%m%d_%H%M%S')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

  release:
    name: Build & Release
    needs: prepare
    runs-on: windows-latest

    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      BUILD_DATE: ${{ needs.prepare.outputs.build_date }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: crm-rust-shared-cache
          cache-on-failure: true
          cache-targets: false

      - name: Build
        shell: bash
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: |
          if [ "${{ github.event.inputs.binary }}" == "all" ]; then
            cargo build --release --bin crm --bin runner --bin yasweb --bin wcxx --bin tasker
          else
            BINS="${{ github.event.inputs.binary }}"
            IFS=',' read -ra BIN_ARRAY <<< "$BINS"
            CMD="cargo build --release"
            for bin in "${BIN_ARRAY[@]}"; do
              bin=$(echo $bin | xargs)
              if [ -n "$bin" ]; then
                CMD="$CMD --bin $bin"
              fi
            done
            eval $CMD
          fi

      - name: Zip
        shell: bash
        run: |
          cd target/release
          EXE_FILES=""
          if [ "${{ github.event.inputs.binary }}" == "all" ]; then
            EXE_FILES="crm.exe runner.exe yasweb.exe wcxx.exe tasker.exe"
          else
            BINS="${{ github.event.inputs.binary }}"
            IFS=',' read -ra BIN_ARRAY <<< "$BINS"
            for bin in "${BIN_ARRAY[@]}"; do
              bin=$(echo $bin | xargs)
              if [ -n "$bin" ]; then
                EXE_FILES="$EXE_FILES $bin.exe"
              fi
            done
          fi
          7z a -p123456 crm_tool_v${{ env.VERSION }}_${{ env.BUILD_DATE }}_windows.zip $EXE_FILES

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: |
            Built binaries: ${{ github.event.inputs.binary }}
            The application was builded in this action
          draft: false
          prerelease: false
          overwrite_files: true
          generate_release_notes: true
          files: target/release/crm_tool_v${{ env.VERSION }}_${{ env.BUILD_DATE }}_windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: crm_tool_windows_zip
          path: target/release/crm_tool_v${{ env.VERSION }}_${{ env.BUILD_DATE }}_windows.zip
          retention-days: 1
