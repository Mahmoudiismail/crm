name: Release Binaries

on:
  workflow_dispatch:
    inputs:
      binary:
        description: 'Binary to release (crm, runner, yasweb, wcxx, or tasker)'
        required: true
        default: 'crm'
        type: choice
        options:
          - crm
          - runner
          - yasweb
          - wcxx
          - tasker
          - all

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: windows-latest
    strategy:
      matrix:
        binary: ${{ fromJson(github.event.inputs.binary == 'all' && '["crm", "runner", "yasweb", "wcxx", "tasker"]' || format('["{0}"]', github.event.inputs.binary)) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "crm-rust-shared-cache"

      - name: Get version
        shell: bash
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n 1 | awk -F '"' '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build binary
        run: cargo build --release --bin ${{ matrix.binary }}

      - name: Prepare artifact zip
        shell: bash
        run: cd "target/release" && 7z a -p123456 ${{ matrix.binary }}_windows.zip ${{ matrix.binary }}.exe

      - name: Get build date
        shell: bash
        run: |
          echo "BUILD_DATE=$(date -u +'%Y%m%d_%H%M%S')" >> $GITHUB_ENV

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}-${{ matrix.binary }}
          name: Release v${{ env.VERSION }} (${{ matrix.binary }})
          draft: false
          prerelease: false
          files: target/release/${{ matrix.binary }}_windows.zip
          overwrite_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Base64 Encode Google Drive Credentials
        id: encode_creds
        shell: bash
        run: |
          # Use an environment variable to securely handle the multi-line JSON secret
          encoded_creds=$(echo -n "$GDRIVE_CREDENTIALS" | base64 -w 0)
          echo "::add-mask::$encoded_creds"
          echo "B64_CREDS=$encoded_creds" >> $GITHUB_ENV
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ env.B64_CREDS }}
          filename: "target/release/${{ matrix.binary }}_windows.zip"
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          name: "v${{ env.VERSION }}-${{ matrix.binary }}_${{ env.BUILD_DATE }}_windows.zip"
          overwrite: "true"
