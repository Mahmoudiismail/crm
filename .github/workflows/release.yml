name: Release Binaries

on:
  workflow_dispatch:
    inputs:
      binary:
        description: 'Binary to release (crm, runner, yasweb, wcxx, or tasker)'
        required: true
        default: 'crm'
        type: choice
        options:
          - crm
          - runner
          - yasweb
          - wcxx
          - tasker
          - all

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: windows-latest
    strategy:
      matrix:
        binary: ${{ fromJson(github.event.inputs.binary == 'all' && '["crm", "runner", "yasweb", "wcxx", "tasker"]' || format('["{0}"]', github.event.inputs.binary)) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: shared-cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            shared-cargo-${{ runner.os }}-

      - name: Get version
        shell: bash
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n 1 | awk -F '"' '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build binary
        run: cargo build --release --bin ${{ matrix.binary }}

      - name: Prepare artifact zip
        shell: bash
        run: cd "target/release" && 7z a -p123456 ${{ matrix.binary }}_windows.zip ${{ matrix.binary }}.exe

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}-${{ matrix.binary }}
          name: Release v${{ env.VERSION }} (${{ matrix.binary }})
          draft: false
          prerelease: false
          files: target/release/${{ matrix.binary }}_windows.zip
          overwrite_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send release email via Resend
        shell: bash
        run: |
          cd "target/release"
          base64 ${{ matrix.binary }}_windows.zip | tr -d '\n' | tr -d '\r' > b64.txt

          jq -n \
            --arg from "onboarding@resend.dev" \
            --arg to "miismail@fakeeh.care" \
            --arg subject "Release for ${{ matrix.binary }}" \
            --arg html "<strong>${{ matrix.binary }}</strong> release is attached. <br/> Password for the zip file is: 123456" \
            --arg filename "${{ matrix.binary }}_windows.zip" \
            --rawfile content b64.txt \
            '{
              from: $from,
              to: [$to],
              subject: $subject,
              html: $html,
              attachments: [
                {
                  filename: $filename,
                  content: $content
                }
              ]
            }' > payload.json

          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @payload.json
