[advisories]
ignore = []

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "OpenSSL",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0"
]
copyleft = "allow"

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
